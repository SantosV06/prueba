<section>
  <h2>Solicitud de Evaluación</h2>

  <div class="box">
    <form id="solicitud" class="solicitud-box" method="post">
      <label>Nombre</label>
      <input name="nombre" placeholder="Nombre" required>
      <label>Teléfono</label>
      <input type="tel" name="telefono" placeholder="Número con código de país" required>
      <label>Describe el problema</label>
      <textarea name="mensaje" placeholder="Describe el problema"></textarea>
      <label>Correo electrónico</label>
      <input type="email" name="correo" placeholder="Correo electrónico" required>
      <button type="submit">Enviar solicitud</button>
    </form>
  </div>

</section>
